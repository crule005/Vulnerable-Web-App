<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Database</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4e73df, #1cc850);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 800px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
}

h1 {
    text-align: center;
}

.search-box {
    margin-top: 15px;
}

.search-box input {
    width: 100%;
    padding: 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    text-align: left;
}

th {
    background: #f5f5f5;
}

button {
    padding: 6px 12px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}

.delete-btn {
    background: #e74a3b;
    color: white;
}

.delete-btn:hover {
    background: #c0392b;
}

.empty {
    text-align: center;
    color: #777;
}
</style>
</head>

<body>

<div class="container">
<h1>User Database</h1>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search users..." onkeyup="searchUsers()">
</div>

<table>
<thead>
<tr>
<th>UserID</th>
<th>Username</th>
<th>Password</th>
<th>Admin</th>
</tr>
</thead>

<tbody id="userBody">
<tr class="empty">
<td colspan="5">No users in database</td>
</tr>
</tbody>
</table>

</div>

<script>

let users = []; // empty database
let filteredUsers = [];

function renderUsers(list = users) {
    const tbody = document.getElementById("userBody");
    tbody.innerHTML = "";

    if (list.length === 0) {
        tbody.innerHTML = `
        <tr class="empty">
        <td colspan="5">No users found</td>
        </tr>
        `;
        return;
    }

    list.forEach((user, index) => {
        const row = document.createElement("tr");

        row.innerHTML = `
        <td>${user.userid}</td>
        <td>${user.username}</td>
        <td>${user.password}</td>
        <td>${user.admin}</td>
        <td>
        <button class="delete-btn" onclick="deleteUser(${index})">Delete</button>
        </td>
        `;

        tbody.appendChild(row);
    });
}

function deleteUser(index) {
    users.splice(index, 1);
    searchUsers();
}

function searchUsers() {
    const search = document.getElementById("searchInput").value.toLowerCase();

    filteredUsers = users.filter(user =>
        user.userid.toString().includes(search) ||
        user.username.toLowerCase().includes(search) ||
        user.password.toLowerCase().includes(search) ||
        user.admin.toString().toLowerCase().includes(search)
    );

    renderUsers(filteredUsers);
}

renderUsers();

</script>

</body>
</html>
